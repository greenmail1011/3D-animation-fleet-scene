<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>法船啟航 ‧ 安東啟航 — 真實感 3D 場景</title>
<style>
  :root{ --gold:#f3d774; --gold-deep:#c79a32; --glass:rgba(8,18,32,0.40);
    --glass-line:rgba(243,215,116,0.26); }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ width:100%; height:100%; overflow:hidden; background:#0a2240;
    font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif; }
  #app{ position:fixed; inset:0; touch-action:none; }
  canvas{ display:block; touch-action:none; }
  #title{ position:fixed; top:calc(16px + env(safe-area-inset-top)); left:calc(18px + env(safe-area-inset-left)); z-index:10; pointer-events:none;
    color:#fff; text-shadow:0 2px 18px rgba(0,0,0,.55); }
  #title .zh{ font-size:30px; font-weight:800; letter-spacing:.22em;
    background:linear-gradient(180deg,#fff,var(--gold)); -webkit-background-clip:text;
    background-clip:text; -webkit-text-fill-color:transparent; }
  #title .sub{ font-size:13px; letter-spacing:.42em; color:var(--gold); margin-top:6px;
    -webkit-text-fill-color:initial; opacity:.92; }
  #panel{ position:fixed; z-index:10; bottom:calc(18px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
    display:flex; flex-wrap:wrap; gap:8px; align-items:center; justify-content:center;
    max-width:calc(100vw - 20px); padding:10px 12px; background:var(--glass);
    border:1px solid var(--glass-line); border-radius:16px; backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px); box-shadow:0 8px 30px rgba(0,0,0,.38); opacity:.66; transition:opacity .25s ease; }
  #panel:hover,#panel:focus-within,#panel.lit{ opacity:1; }
  .btn{ cursor:pointer; border:1px solid rgba(243,215,116,.20); color:rgba(247,238,207,.82);
    background:rgba(255,255,255,.03); padding:8px 13px; border-radius:11px; font-size:13.5px;
    letter-spacing:.08em; transition:.18s; white-space:nowrap; }
  .btn:hover{ background:rgba(243,215,116,.16); border-color:var(--gold); color:#f7eecf; }
  .btn.active{ background:linear-gradient(180deg,var(--gold),var(--gold-deep));
    color:#3a2a06; border-color:var(--gold); font-weight:700; }
  .sep{ width:1px; height:26px; background:rgba(243,215,116,.25); margin:0 2px; }
  .hint{ color:#cfe0f5; font-size:12px; letter-spacing:.05em; opacity:.85; padding:0 6px; }
  .btn.icon{ padding:9px 12px; font-size:16px; line-height:1; }
  #showBtn{ position:fixed; z-index:11; bottom:calc(18px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
    display:none; cursor:pointer; color:#f7eecf; background:rgba(10,22,38,0.62);
    border:1px solid rgba(243,215,116,.42); border-radius:12px; padding:10px 18px; font-size:13px;
    letter-spacing:.12em; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    box-shadow:0 10px 40px rgba(0,0,0,.45); }
  #showBtn:hover{ border-color:var(--gold); background:rgba(243,215,116,.16); }
  #loader{ position:fixed; inset:0; z-index:50; display:flex; align-items:center;
    justify-content:center; flex-direction:column; gap:18px;
    background:radial-gradient(120% 120% at 50% 20%,#15406f,#081a30); color:#f7eecf; }
  #loader .ring{ width:54px; height:54px; border-radius:50%;
    border:4px solid rgba(243,215,116,.25); border-top-color:var(--gold);
    animation:spin 1s linear infinite; }
  #loader .t{ font-size:15px; letter-spacing:.34em; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  #loader.hide{ opacity:0; pointer-events:none; transition:opacity .8s ease; }
  #err{ position:fixed; inset:0; z-index:60; display:none; align-items:center;
    justify-content:center; padding:30px; text-align:center; color:#ffdede;
    background:#1a0c0c; font-size:15px; line-height:1.8; }
  @media (max-width:560px){
    #title .zh{ font-size:21px; } #title .sub{ font-size:10.5px; letter-spacing:.28em; }
    #panel{ gap:6px; padding:8px 9px; border-radius:14px; }
    .btn{ padding:9px 11px; font-size:12.5px; }
    .sep{ display:none; } .hint{ display:none; }
  }
  @media (max-width:380px){
    #title .zh{ font-size:18px; } #title .sub{ letter-spacing:.2em; }
    .btn{ padding:8px 9px; font-size:11.5px; letter-spacing:.04em; }
    #panel{ gap:5px; }
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="title">
  <div class="zh">法船啟航</div>
  <div class="sub">安 東 啟 航 ‧ 揚 帆 前 行</div>
</div>
<div id="panel">
  <button class="btn active" data-mode="orbit">繞行航拍</button>
  <button class="btn" data-mode="side">側面跟拍</button>
  <button class="btn" data-mode="aerial">俯瞰全景</button>
  <div class="sep"></div>
  <button class="btn" id="resetBtn">重置視角</button>
  <span class="hint">滑鼠拖曳旋轉 ‧ 滾輪縮放</span>
  <div class="sep"></div>
  <button class="btn icon" id="hideBtn" title="隱藏控制列 (H)">⌄</button>
</div>
<button id="showBtn" title="顯示控制列 (H)">☰ 控制列</button>
<div id="loader"><div class="ring"></div><div class="t">法 船 啟 航 中…</div></div>
<div id="err"></div>

		varying vec3 vSunDirection;

		varying vec3 vBetaM;
		varying float vSunE;

		float rayleighPhase( float cosTheta ) {
			return THREE_OVER_SIXTEENPI * ( 1.0 + pow( cosTheta, 2.0 ) );
		}

		float hgPhase( float cosTheta, float g ) {
			float g2 = pow( g, 2.0 );

/* 程序化海洋法線貼圖(無需外部圖檔,可離線) */
function genWaterNormals(size){
  size=size||256;
  var waves=[],i;
  for(i=0;i<18;i++){
    var kx=Math.floor(1+Math.random()*8)*(Math.random()<0.5?-1:1);
    var ky=Math.floor(1+Math.random()*8)*(Math.random()<0.5?-1:1);
    var k2=kx*kx+ky*ky;
    waves.push({kx:kx,ky:ky,amp:(0.6+Math.random()*0.8)/k2,ph:Math.random()*6.2831853});
  }
  var c=document.createElement("canvas"); c.width=c.height=size;
  var ctx=c.getContext("2d"), img=ctx.createImageData(size,size), d=img.data, TP=Math.PI*2;
  for(var y=0;y<size;y++) for(var x=0;x<size;x++){
    var gx=0,gy=0;
    for(i=0;i<waves.length;i++){ var wv=waves[i];
      var th=TP*(wv.kx*x/size+wv.ky*y/size)+wv.ph, cs=Math.cos(th)*wv.amp;
      gx+=cs*wv.kx; gy+=cs*wv.ky;
    }
    var nx=-gx*0.10, ny=-gy*0.10, nz=1.0, inv=1/Math.sqrt(nx*nx+ny*ny+nz*nz);
    var idx=(y*size+x)*4;
    d[idx]=((nx*inv)*0.5+0.5)*255; d[idx+1]=((ny*inv)*0.5+0.5)*255;
    d[idx+2]=((nz*inv)*0.5+0.5)*255; d[idx+3]=255;
  }
  ctx.putImageData(img,0,0);
  var t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.anisotropy=8;
  return t;
}

var sky = new THREE.Sky();

  var u = sky.material.uniforms;
  u["turbidity"].value = SKYP.turbidity;
  u["rayleigh"].value = SKYP.rayleigh;
  u["mieCoefficient"].value = SKYP.mie;
  u["mieDirectionalG"].value = SKYP.mieG;

/* ============ 真實感海洋(THREE.Water) ============ */
var water;
(function(){
  var geo = new THREE.PlaneGeometry(12000, 12000);
  var nrm = genWaterNormals(256);

    textureWidth: 1024, textureHeight: 1024,

  scene.add(water);
})();

var envRT;
function updateSun(){
  var phi = THREE.MathUtils.degToRad(90 - SKYP.elevation);
  var theta = THREE.MathUtils.degToRad(SKYP.azimuth);
  sunV.setFromSphericalCoords(1, phi, theta);
  sky.material.uniforms["sunPosition"].value.copy(sunV);
  water.material.uniforms["sunDirection"].value.copy(sunV).normalize();
  sunLight.position.copy(sunV).multiplyScalar(1000);
  if(envRT) envRT.dispose();
  envRT = pmrem.fromScene(sky);
  scene.environment = envRT.texture;
}

}

/* ============ 布料(帆/旗)動畫 ============ */
var cloths=[];
function registerCloth(mesh, kind, amp, sp){
  var pos=mesh.geometry.attributes.position, base=new Float32Array(pos.array.length);
  base.set(pos.array);
  var xmin=1e9,xmax=-1e9,ymin=1e9,ymax=-1e9;
  for(var i=0;i<pos.count;i++){ var x=base[i*3],y=base[i*3+1];
    if(x<xmin)xmin=x; if(x>xmax)xmax=x; if(y<ymin)ymin=y; if(y>ymax)ymax=y; }
  cloths.push({mesh:mesh,pos:pos,base:base,kind:kind,amp:amp,sp:sp,
    xmin:xmin,xmax:xmax,ymin:ymin,ymax:ymax,t:Math.random()*10});
}
function updateCloths(t){
  for(var c=0;c<cloths.length;c++){ var o=cloths[c],p=o.pos,b=o.base,n=p.count;
    var w=(o.xmax-o.xmin)||1,hg=(o.ymax-o.ymin)||1,tt=t*o.sp+o.t;
    for(var i=0;i<n;i++){ var ix=i*3,x=b[ix],y=b[ix+1],z=b[ix+2],dx=0,dy=0,dz=0;
      if(o.kind==="sail"){ var v=(y-o.ymin)/hg,u=(x-o.xmin)/w, belly=Math.sin(v*Math.PI),
          breathe=0.80+0.20*Math.sin(tt*0.9+u*1.2),
          w1=0.5+0.5*Math.sin(u*4.0+tt*1.7),
          w2=0.5+0.5*Math.sin(u*7.0-tt*2.4+v*3.0);
        dz=belly*o.amp*(1.5*breathe+0.7*w1+0.4*w2);   // 一律向前(背風側)鼓起,絕不往後穿過桅桿/帆桁
        dx=Math.sin(u*3.0+tt*1.3)*o.amp*0.12*belly; }
      else if(o.kind==="banner"){ var vv=(o.ymax-y)/hg;
        dx=Math.sin(vv*3.0+tt)*o.amp*vv; dz=(0.5+0.5*Math.sin(vv*4.0+tt*1.2))*o.amp*0.9*vv; }  // dz≥0:只向前飄,不往後穿旗桿
      else if(o.kind==="pennant"){ var uu=(x-o.xmin)/w;
        dz=Math.sin(uu*7-tt*1.4)*o.amp*uu; dy=Math.sin(uu*5-tt)*o.amp*0.35*uu; }
      p.array[ix]=x+dx; p.array[ix+1]=y+dy; p.array[ix+2]=z+dz;
    }
    p.needsUpdate=true; o.mesh.geometry.computeVertexNormals();
  }
}

function M(geo,mat){ return new THREE.Mesh(geo,mat); }
function cyl(rt,rb,h,seg,mat){ return M(new THREE.CylinderGeometry(rt,rb,h,seg||12),mat); }
function roundedBoxGeo(w,h,d,r){
  r=Math.min(r,w/2-0.001,h/2-0.001,d/2-0.001);
  var sh=new THREE.Shape();
  sh.moveTo(-w/2,-h/2+r);
  sh.lineTo(-w/2,h/2-r); sh.quadraticCurveTo(-w/2,h/2,-w/2+r,h/2);
  sh.lineTo(w/2-r,h/2); sh.quadraticCurveTo(w/2,h/2,w/2,h/2-r);
  sh.lineTo(w/2,-h/2+r); sh.quadraticCurveTo(w/2,-h/2,w/2-r,-h/2);
  sh.lineTo(-w/2+r,-h/2); sh.quadraticCurveTo(-w/2,-h/2,-w/2,-h/2+r);
  var g=new THREE.ExtrudeGeometry(sh,{depth:d-2*r,bevelEnabled:true,bevelThickness:r,bevelSize:r,bevelSegments:3,steps:1});
  g.center(); return g;
}

function makeSail(w,h,withLogo){
  if(withLogo===undefined) withLogo=true;
  var aspect=w/h, CH=256, CW=Math.max(96,Math.round(CH*aspect));
  var c=document.createElement("canvas"); c.width=CW; c.height=CH; var x=c.getContext("2d");
  var g=x.createLinearGradient(0,0,0,CH); g.addColorStop(0,"#efe6cd"); g.addColorStop(1,"#e3d4b2");
  x.fillStyle=g; x.fillRect(0,0,CW,CH);
  for(var i=0;i<Math.round(CW*0.7);i++){ x.fillStyle="rgba(120,95,55,"+rnd(0.02,0.06).toFixed(2)+")"; x.fillRect(rnd(0,CW),rnd(0,CH),rnd(8,40),1); }

var wakeMats=[];
function genFoamTex(size){
  size=size||256; var waves=[],i;
  for(i=0;i<16;i++){ var kx=1+((Math.random()*6)|0), ky=1+((Math.random()*6)|0);
    waves.push({kx:kx*(Math.random()<0.5?-1:1),ky:ky*(Math.random()<0.5?-1:1),a:1/(1+kx+ky),p:Math.random()*6.2831853}); }
  var c=document.createElement("canvas"); c.width=c.height=size;
  var ctx=c.getContext("2d"), img=ctx.createImageData(size,size), d=img.data, TP=Math.PI*2;
  var buf=new Float32Array(size*size), mn=1e9, mx=-1e9;
  for(var y=0;y<size;y++)for(var x=0;x<size;x++){ var s=0;
    for(i=0;i<waves.length;i++){ var w=waves[i]; s+=w.a*Math.sin(TP*(w.kx*x/size+w.ky*y/size)+w.p); }
    buf[y*size+x]=s; if(s<mn)mn=s; if(s>mx)mx=s; }
  for(i=0;i<buf.length;i++){ var v=Math.pow((buf[i]-mn)/(mx-mn),2.0), gg=(v*255)|0, k=i*4;
    d[k]=d[k+1]=d[k+2]=gg; d[k+3]=255; }
  ctx.putImageData(img,0,0);
  var t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; return t;
}
var FOAM_TEX=genFoamTex(256);
function makeWake(beam,length){
  var N=52, Mc=16, wA=beam*0.32, wB=beam*1.7, pos=[],uv=[],idx=[],i,j;
  for(i=0;i<=N;i++){ var v=i/N, hw=wA+(wB-wA)*v, z=-v*length;
    for(j=0;j<=Mc;j++){ var u=j/Mc; pos.push((u-0.5)*2*hw,0.12,z); uv.push(u,v); } }
  var row=Mc+1;
  for(i=0;i<N;i++)for(j=0;j<Mc;j++){ var a=i*row+j,b=a+1,c=a+row,dd=c+1; idx.push(a,c,b,b,c,dd); }
  var g=new THREE.BufferGeometry();
  g.setAttribute("position",new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute("uv",new THREE.Float32BufferAttribute(uv,2));
  g.setIndex(idx);
  var mat=new THREE.ShaderMaterial({transparent:true,depthWrite:false,fog:false,
    uniforms:{uTime:{value:0},uFoam:{value:FOAM_TEX}},
    vertexShader:"varying vec2 vUv; varying float vH; varying float vSpray; uniform float uTime; void main(){ vUv=uv; float cd=abs(uv.x-0.5)*2.0; float arms=smoothstep(0.46,0.99,cd); float churn=1.0-smoothstep(0.0,0.20,uv.y); float along=1.0-smoothstep(0.30,1.08,uv.y); float n=sin(uv.x*18.0+uTime*1.3)*0.5+sin(uv.y*12.0-uTime*2.0)*0.5; n=n*0.5+0.5; float ripple=sin(uv.y*20.0-uTime*2.2)*0.5+0.5; float h=(arms*0.95+churn*1.05+0.22)*(0.45+0.65*n)*(0.6+0.5*ripple)*along; float lift=h*0.6+smoothstep(0.55,1.4,h)*0.85; vH=h; vSpray=clamp((0.12+lift)/1.55,0.0,1.0); vec3 p=position; p.y+=lift; gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.0); }",
    fragmentShader:[
      "varying vec2 vUv; varying float vH; varying float vSpray; uniform float uTime; uniform sampler2D uFoam;",
      "void main(){",
      "  float cd=abs(vUv.x-0.5)*2.0;",
      "  float f1=texture2D(uFoam, vec2(vUv.x*2.0, vUv.y*3.0 - uTime*0.5)).r;",
      "  float f2=texture2D(uFoam, vec2(vUv.x*4.0+0.3, vUv.y*6.0 - uTime*0.9)).r;",
      "  float foam=f1*0.82+f2*0.82;",
      "  float arms=smoothstep(0.46,0.97,cd);",
      "  float churn=1.0-smoothstep(0.0,0.18,vUv.y);",
      "  float center=(1.0-cd)*(1.0-smoothstep(0.0,0.66,vUv.y))*0.6;",
      "  float along=1.0-smoothstep(0.42,1.08,vUv.y);",
      "  float edge=1.0-smoothstep(0.94,1.0,cd);",
      "  float mask=clamp(churn*1.45+arms*1.35+center+0.16,0.0,1.85)*along*edge;",
      "  float a=clamp(mask*(0.60+1.10*foam),0.0,1.0);",
      "  a*=smoothstep(0.01,0.22, foam*mask+churn*0.42);",
      "  if(a<0.010) discard;",
      "  float cr=smoothstep(0.10,0.82,vSpray);",
      "  vec3 col=mix(vec3(0.84,0.91,0.99), vec3(1.0,1.0,1.0), cr);",
      "  a=clamp(a*(0.82+0.45*cr),0.0,1.0);",
      "  gl_FragColor=vec4(col, a);",
      "}"
    ].join("\n")
  });
  wakeMats.push(mat);
  return new THREE.Mesh(g,mat);
}

/* ============ 法船本體(放樣曲面船殼) ============ */
function buildHull(length,width,height,flagship){
  var grp=new THREE.Group();
  var beam=width*0.5, fb=height*0.60, keel=-height*0.30, bowRise=height*0.46;
  var zB=length*0.52, zS=-length*0.52, N=48, Mn=26, i, j;
  function ws(u){ var s=Math.pow(Math.max(Math.sin(Math.PI*(0.10+0.86*u)),0),0.85); return 0.05+s; }
  function keelY(u){ var bow=Math.pow(Math.max(0,(u-0.6)/0.4),1.7),
    stern=Math.pow(Math.max(0,(0.15-u)/0.15),1.5)*0.6; return keel*(1-0.75*bow)*(1-0.5*stern); }
  function sheer(u){ var fwd=Math.max(0,(u-0.5)*2), aft=Math.max(0,(0.5-u)*2);
    return fb + bowRise*Math.pow(fwd,1.9) + fb*0.22*Math.pow(aft,1.8); }
  function kpow(u){ return 1.9+0.5*Math.sin(Math.PI*u); }
  var base=flagship?[0.80,0.50,0.38]:[0.66,0.40,0.30];
  var pos=[],uv=[],col=[];
  for(i=0;i<=N;i++){ var u=i/N,z=zS+(zB-zS)*u,B=beam*ws(u),ky=keelY(u),sy=sheer(u),k=kpow(u);
    for(j=0;j<=Mn;j++){ var t=-1+2*(j/Mn),at=Math.abs(t),x=B*t,y=ky+(sy-ky)*Math.pow(at,k);
      pos.push(x,y,z); uv.push(u*4,j/Mn);
      if(y>-0.08&&y<0.34) col.push(0.50,0.13,0.10); else col.push(base[0],base[1],base[2]); } }
  var idx=[],row=Mn+1;
  for(i=0;i<N;i++) for(j=0;j<Mn;j++){ var a=i*row+j,b=a+1,c=a+row,d=c+1; idx.push(a,c,b,b,c,d); }
  var g=new THREE.BufferGeometry();
  g.setAttribute("position",new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute("uv",new THREE.Float32BufferAttribute(uv,2));
  g.setAttribute("color",new THREE.Float32BufferAttribute(col,3));
  g.setIndex(idx); g.computeVertexNormals();
  grp.add(M(g,new THREE.MeshStandardMaterial({map:TEX.wood,vertexColors:true,roughness:0.6,metalness:0.05,side:THREE.DoubleSide})));
  var dp=[],du=[],dn=8;
  for(i=0;i<=N;i++){ var u2=i/N,z2=zS+(zB-zS)*u2,B2=beam*ws(u2)*0.9,y2=sheer(u2)-0.18;
    for(j=0;j<=dn;j++){ var t2=-1+2*(j/dn); dp.push(B2*t2,y2,z2); du.push(u2*4,j/dn); } }
  var di=[],drow=dn+1;
  for(i=0;i<N;i++) for(j=0;j<dn;j++){ var aa=i*drow+j,bb=aa+1,cc=aa+drow,dd=cc+1; di.push(aa,cc,bb,bb,cc,dd); }
  var dg=new THREE.BufferGeometry();
  dg.setAttribute("position",new THREE.Float32BufferAttribute(dp,3));
  dg.setAttribute("uv",new THREE.Float32BufferAttribute(du,2));
  dg.setIndex(di); dg.computeVertexNormals();
  grp.add(M(dg,MAT.deck));
  [-1,1].forEach(function(sg){ var cpts=[];
    for(var ii=0;ii<=N;ii++){ var u3=ii/N; cpts.push(new THREE.Vector3(sg*beam*ws(u3),sheer(u3),zS+(zB-zS)*u3)); }
    grp.add(M(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(cpts),N,Math.max(0.07,beam*0.05),8,false),MAT.gold)); });
  var stem=M(new THREE.SphereGeometry(Math.max(0.1,beam*0.08),10,8),MAT.gold);
  stem.position.set(0,sheer(1),zB); grp.add(stem);
  // 船首/船尾隔板(封閉船殼,避免中空)
  var capMat=new THREE.MeshStandardMaterial({map:TEX.wood,color:flagship?0x9a4a30:0x6e3320,roughness:0.66,metalness:0.05,side:THREE.DoubleSide});
  function makeCap(u,z){ var B=Math.max(0.06,beam*ws(u)),ky=keelY(u),sy=sheer(u),k=kpow(u);
    var sh=new THREE.Shape(); sh.moveTo(-B,sy);
    for(var sI=0;sI<=22;sI++){ var t=-1+2*(sI/22),yy=ky+(sy-ky)*Math.pow(Math.abs(t),k); sh.lineTo(B*t,yy); }
    sh.lineTo(-B,sy);
    var mm=M(new THREE.ShapeGeometry(sh),capMat); mm.position.z=z; return mm; }
  grp.add(makeCap(0,zS)); grp.add(makeCap(1,zB));
  return grp;
}

function buildBoat(opts){

  var sailTiers=[{wf:1.20,hf:0.30,lz:true},{wf:1.00,hf:0.25,lz:true},{wf:0.78,hf:0.19,lz:false}];        // 前/後桅:滿帆、帆底較低
  var sailTiersMid=[{wf:1.20,hf:0.20,lz:true},{wf:1.00,hf:0.17,lz:true},{wf:0.78,hf:0.13,lz:false}];     // 主桅:在高船艙上方,帆抬高並略縮以容納
  masts.forEach(function(mk,mi){

    if(flagship){
      var mid=(mi===1);                               // 中央主桅(在高船艙上方)
      var yb=deckY+mk.h*(mid?0.42:0.16);              // 主桅帆底抬到艙頂之上;前/後桅維持較低、滿帆
      (mid?sailTiersMid:sailTiers).forEach(function(tr){
        var sw2=W*tr.wf, sh2=mk.h*tr.hf, yt=yb+sh2;   // yt:此層帆頂(帆桁所在)
        var yd=cyl(0.085,0.085,sw2+1.0,8,MAT.wood); yd.rotation.z=Math.PI/2;

      var sail=makeSail(mk.sw*1.55,mk.h*0.66); sail.position.set(0,deckY+mk.h*0.5,mk.z+0.25); grp.add(sail);
    }
    var pen=makePennant(opts.pennantColor||0xe9c44c,1.6,0.7); pen.position.set(0.8,deckY+mk.h-0.4,mk.z); grp.add(pen);
    tops.push(new THREE.Vector3(0,deckY+mk.h,mk.z));
  });

  // 船首斜桅(bowsprit,僅大法船,呈現前傾雄偉輪廓;斜桅帆已依使用者要求移除)
  var bowTip;
  if(flagship){
    var Lb=L*0.34, bsAng=Math.PI/2-0.40, dz=Math.sin(bsAng), dy=Math.cos(bsAng);
    var P0=new THREE.Vector3(0,H*0.86,L*0.46);
    var bs=cyl(0.11,0.17,Lb,9,MAT.wood); bs.rotation.x=bsAng;
    bs.position.set(0,P0.y+(Lb/2)*dy,P0.z+(Lb/2)*dz); grp.add(bs);
    bowTip=new THREE.Vector3(0,P0.y+Lb*dy,P0.z+Lb*dz);
  }

  // 索具:前支索接斜桅/船首、後支索接船尾、桅與桅相連、加兩側側支索(端點皆落在船體)
  var bowA=flagship?bowTip:new THREE.Vector3(0,H*0.92,L*0.46), sternA=new THREE.Vector3(0,H*0.60,-L*0.46);
  addStay(grp,tops[0],bowA); addStay(grp,tops[tops.length-1],sternA);
  if(flagship&&tops.length>1) addStay(grp,tops[1],bowA);
  for(var tk=0;tk<tops.length-1;tk++) addStay(grp,tops[tk],tops[tk+1]);
  if(flagship){ masts.forEach(function(mk,mi){ var T=tops[mi];
    addStay(grp,T,new THREE.Vector3( W*0.42,deckY-0.1,mk.z));
    addStay(grp,T,new THREE.Vector3(-W*0.42,deckY-0.1,mk.z)); }); }

  if(flagship){
    // 船首旗桿 +「安東啟航」直幡(移到船頭前方,正面清楚可見;位於前桅與龍首之間、避開帆面)
    var poleH=H*2.2, polZ=L*0.42, pole=cyl(0.10,0.14,poleH,10,MAT.wood);
    pole.position.set(0,deckY+poleH/2,polZ); grp.add(pole);
    var ptop=M(new THREE.SphereGeometry(0.16,10,8),MAT.gold); ptop.position.set(0,deckY+poleH,polZ); grp.add(ptop);
    var banner=makeBanner(bannerTexture("安東啟航"),2.0,7.0);
    banner.position.set(0,deckY+poleH-3.7,polZ+0.25); grp.add(banner); }

  var lanternsN=flagship?6:2;
  for(var li=0;li<lanternsN;li++){ var lan=makeLantern(flagship?0.9:0.6);
    var side=(li%2===0)?-1:1, seg=Math.floor(li/2);
    lan.position.set(side*W*0.30, deckY+0.5, L*0.12 - seg*(L*0.22)); grp.add(lan); }

  grp.add(makeShadow(L*1.2,W*1.2));
  return grp;
}

/* ============ 艦隊 ============ */
var fleet=new THREE.Group(); scene.add(fleet);
var boats=[];
function addWakeFor(px,pz,L,W){ var wk=makeWake(W*1.05, L*2.0); wk.position.set(px,0.0,pz - L*0.46); fleet.add(wk);
  var bw=makeWake(W*1.0, L*0.72); bw.position.set(px,0.0,pz + L*0.46); fleet.add(bw); }   // 船首破浪波紋
var flag=buildBoat({length:34,width:11,height:4.2,flagship:true,pennantColor:0xe9c44c});
flag.position.set(0,0,4); fleet.add(flag); boats.push({grp:flag,ph:0,amp:0.42}); addWakeFor(0,4,34,11);
var smallPos=[[-15,0,-9],[15,0,-9],[-25,0,-22],[25,0,-22],[-35,0,-36],[35,0,-36]];
var pennantCols=[0xe23b27,0xf3d774,0x2f8f4f,0x2f6fbf,0xc0392b,0xe98a1f];
smallPos.forEach(function(p,i){
  var b=buildBoat({length:16,width:6,height:2.6,flagship:false,pennantColor:pennantCols[i]});
  b.position.set(p[0],p[1],p[2]); fleet.add(b); boats.push({grp:b,ph:i*1.1+1,amp:0.6});
  addWakeFor(p[0],p[2],16,6);
});

/* 幾朵遠方薄雲 */
var clouds=[];
(function(){ var tex=makeTex(128,128,function(x){ var g=x.createRadialGradient(64,64,4,64,64,62);
  g.addColorStop(0,"rgba(255,255,255,0.9)"); g.addColorStop(0.5,"rgba(255,255,255,0.4)");
  g.addColorStop(1,"rgba(255,255,255,0)"); x.fillStyle=g; x.fillRect(0,0,128,128); });
  for(var i=0;i<10;i++){ var m=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,
    opacity:rnd(0.25,0.5),depthWrite:false})); var s=rnd(260,520);
    m.scale.set(s,s*0.55,1); m.position.set(rnd(-1800,1800),rnd(380,720),rnd(-1800,-700));
    m.userData.sp=rnd(3,7); scene.add(m); clouds.push(m); }
})();

/* ============ 相機系統 ============ */
var target=new THREE.Vector3(0,5,-14);
var cam={r:112,th:0.7,phi:1.0}, camTar={r:112,th:0.7,phi:1.0}, fitScale=1;
var autoSpin=true, dragging=false, lastX=0, lastY=0;
var PRESETS={ orbit:{r:112,phi:0.98,spin:true,th:0.7}, side:{r:98,phi:1.26,spin:false,th:0.0},
  aerial:{r:185,phi:0.42,spin:true,th:0.9} };
function setMode(m){ var p=PRESETS[m]; if(!p)return; camTar.r=p.r; camTar.phi=p.phi;
  if(p.th!==undefined)camTar.th=p.th; autoSpin=p.spin;
  document.querySelectorAll(".btn[data-mode]").forEach(function(b){ b.classList.toggle("active",b.dataset.mode===m); }); }
document.querySelectorAll(".btn[data-mode]").forEach(function(b){ b.addEventListener("click",function(){ setMode(b.dataset.mode); }); });
EL("resetBtn").addEventListener("click",function(){ setMode("orbit"); });
function setUI(show){ EL("panel").style.display=show?"flex":"none"; EL("showBtn").style.display="none"; }  // 隱藏=完全隱藏(連顯示鈕都不留;點畫面或按 H 叫回)
EL("hideBtn").addEventListener("click",function(){ setUI(false); });
EL("showBtn").addEventListener("click",function(){ setUI(true); });
window.addEventListener("keydown",function(e){ if((e.key==="h"||e.key==="H")&&!e.metaKey&&!e.ctrlKey&&!e.altKey){ setUI(EL("panel").style.display==="none"); } });
var litT; function litPanel(){ var p=EL("panel"); if(p){ p.classList.add("lit"); clearTimeout(litT); litT=setTimeout(function(){ p.classList.remove("lit"); },2600); } }
EL("panel").addEventListener("pointerdown",litPanel);
var dom=renderer.domElement;
var downX=0,downY=0,tapMoved=false;
dom.addEventListener("pointerdown",function(e){ dragging=true; autoSpin=false; lastX=e.clientX; lastY=e.clientY;
  downX=e.clientX; downY=e.clientY; tapMoved=false; dom.setPointerCapture(e.pointerId); });
dom.addEventListener("pointermove",function(e){ if(!dragging)return; var dx=e.clientX-lastX,dy=e.clientY-lastY;
  lastX=e.clientX; lastY=e.clientY; camTar.th-=dx*0.005; camTar.phi-=dy*0.005;
  camTar.phi=Math.max(0.12,Math.min(1.45,camTar.phi));
  if(Math.abs(e.clientX-downX)>6||Math.abs(e.clientY-downY)>6) tapMoved=true; });
function endDrag(){ dragging=false;
  if(!tapMoved && EL("panel").style.display==="none") setUI(true); }   // 點按(非拖曳)叫回完全隱藏的控制列
dom.addEventListener("pointerup",endDrag); dom.addEventListener("pointercancel",endDrag);
dom.addEventListener("wheel",function(e){ e.preventDefault(); camTar.r*=(1+(e.deltaY>0?1:-1)*0.08);
  camTar.r=Math.max(48,Math.min(420,camTar.r)); },{passive:false});
var pinch=0;
dom.addEventListener("touchmove",function(e){ if(e.touches.length===2){ var dx=e.touches[0].clientX-e.touches[1].clientX,
  dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.hypot(dx,dy);
  if(pinch){ camTar.r*=(1-(d-pinch)*0.006); camTar.r=Math.max(48,Math.min(420,camTar.r)); } pinch=d; } },{passive:true});
dom.addEventListener("touchend",function(){ pinch=0; });

/* ============ 動畫迴圈 ============ */
var clock=new THREE.Clock(), prevT=0;
function animate(){
  requestAnimationFrame(animate);
  var t=clock.getElapsedTime(), dt=Math.min(t-prevT,0.05); prevT=t;

  water.material.uniforms["time"].value += dt;
  for(var wi=0;wi<wakeMats.length;wi++) wakeMats[wi].uniforms.uTime.value = t;

  for(var i=0;i<boats.length;i++){ var b=boats[i],g=b.grp;
    g.position.y=Math.sin(t*0.85+b.ph)*b.amp;
    g.rotation.x=Math.sin(t*0.8+b.ph)*0.03;
    g.rotation.z=Math.sin(t*0.6+b.ph*1.3)*0.04;
  }
  fleet.rotation.y=Math.sin(t*0.16)*0.02;
  updateCloths(t);
  scene.traverse(function(o){ if(o.userData&&o.userData.lantern) o.rotation.z=Math.sin(t*1.4+o.userData.ph)*0.16; });
  for(var ci=0;ci<clouds.length;ci++){ var cl=clouds[ci]; cl.position.x-=cl.userData.sp*dt;
    if(cl.position.x<-1900) cl.position.x=1900; }

  if(autoSpin&&!dragging) camTar.th+=dt*0.075;
  cam.r+=(camTar.r-cam.r)*0.07; cam.th+=(camTar.th-cam.th)*0.07; cam.phi+=(camTar.phi-cam.phi)*0.07;
  var sp=Math.sin(cam.phi),cp=Math.cos(cam.phi);
  var rr=cam.r*fitScale; camera.position.set(target.x+rr*sp*Math.cos(cam.th), target.y+rr*cp, target.z+rr*sp*Math.sin(cam.th));
  camera.lookAt(target.x,target.y+Math.sin(t*0.5)*0.6,target.z);

  renderer.render(scene,camera);
}
function fitView(){ var aspect=innerWidth/innerHeight; camera.aspect=aspect;
  if(aspect<1){ camera.fov=54; fitScale=Math.max(1,Math.min(1.6,0.72/Math.max(aspect,0.42))); }  // 直式手機:加大視角並拉遠,寬廣艦隊入鏡
  else { camera.fov=46; fitScale=1; }
  camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); }
addEventListener("resize",fitView); addEventListener("orientationchange",fitView); fitView();

animate();
setTimeout(function(){ EL("loader").classList.add("hide"); }, 700);

})();
</script>
